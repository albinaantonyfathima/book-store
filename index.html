<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PageTurn — Online Bookstore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ── RESET & VARIABLES ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #1a1a2e;
      --paper:  #faf7f2;
      --cream:  #f0ebe0;
      --accent: #c0392b;
      --gold:   #d4a017;
      --muted:  #7a7060;
      --card:   #ffffff;
      --shadow: 0 4px 24px rgba(26,26,46,0.10);
      --radius: 12px;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── NAVBAR ────────────────────────────────────────────── */
    nav {
      background: var(--ink);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--paper);
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--gold); }
    nav ul { list-style: none; display: flex; gap: 2rem; }
    nav ul a {
      color: #ccc;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    nav ul a:hover, nav ul a.active { color: var(--gold); }

    /* ── HERO ──────────────────────────────────────────────── */
    .hero {
      background: linear-gradient(135deg, var(--ink) 60%, #2c2c54 100%);
      color: var(--paper);
      padding: 2.5rem 2rem 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 1rem;
    }
    .hero h1 em { font-style: italic; color: var(--gold); }
    .hero p {
      font-size: 1.1rem;
      color: #aaa;
      max-width: 500px;
      margin: 0 auto 2rem;
    }
    .btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      border: none;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #a93226; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(192,57,43,0.4); }
    .btn-outline { background: transparent; color: var(--paper); border: 2px solid rgba(255,255,255,0.3); margin-left: 1rem; }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

    /* ── SEARCH & FILTER BAR ──────────────────────────────── */
    .controls {
      background: var(--cream);
      padding: 1.25rem 2rem;
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 1px solid #ddd8cc;
    }
    .search-wrap {
      flex: 1;
      min-width: 220px;
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      padding: 0.6rem 1rem 0.6rem 2.8rem;
      border: 1px solid #ddd;
      border-radius: 50px;
      font-size: 0.9rem;
      background: white;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap::before {
      content: '';
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.85rem;
    }
    .filter-select {
      padding: 0.6rem 1rem;
      border: 1px solid #ddd;
      border-radius: 50px;
      font-size: 0.9rem;
      background: white;
      cursor: pointer;
      outline: none;
    }
    .count-badge {
      margin-left: auto;
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* ── CATALOG GRID ──────────────────────────────────────── */
    .catalog-section { padding: 2rem; max-width: 1200px; margin: 0 auto; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.5rem;
    }

    .book-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: transform 0.25s, box-shadow 0.25s;
      animation: fadeUp 0.4s ease both;
    }
    .book-card:hover { transform: translateY(-6px); box-shadow: 0 12px 36px rgba(26,26,46,0.16); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .book-cover {
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      position: relative;
      overflow: hidden;
    }
    .book-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .genre-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.55);
      color: white;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .out-of-stock-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
    }

    .book-body { padding: 1rem; }
    .book-title {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 0.25rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .book-author {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }
    .book-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid #eee;
      padding-top: 0.75rem;
      margin-top: 0.25rem;
    }
    .book-price {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--accent);
    }
    .stock-info {
      font-size: 0.72rem;
      color: var(--muted);
    }
    .stock-info.low { color: #e67e22; font-weight: 600; }
    .stock-info.out { color: #c0392b; font-weight: 700; }

    .btn-order {
      display: block;
      width: 100%;
      margin-top: 0.75rem;
      padding: 0.5rem;
      background: var(--ink);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn-order:hover { background: var(--accent); }
    .btn-order:disabled, .btn-order.disabled {
      background: #ccc;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* ── LOADING / EMPTY ───────────────────────────────────── */
    .loading, .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
      grid-column: 1/-1;
    }
    .loading::after {
      content: '';
      display: block;
      width: 40px;
      height: 40px;
      border: 3px solid #ddd;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 1rem auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER ────────────────────────────────────────────── */
    footer {
      background: var(--ink);
      color: #888;
      text-align: center;
      padding: 2rem;
      font-size: 0.85rem;
      margin-top: 4rem;
    }
    footer a { color: var(--gold); text-decoration: none; }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo">Page<span>Turn</span></div>
    <ul>
      <li><a href="index.html" class="active">Catalog</a></li>
      <li><a href="order.html">Order</a></li>
      <li><a href="admin.html">Admin</a></li>
    </ul>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <h1>Discover Your Next<br><em>Great Read</em></h1>
    <p>Thousands of titles. Curated with care. Delivered to your door.</p>
  </section>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search by title or author…">
    </div>
    <select id="genreFilter" class="filter-select">
      <option value="">All Genres</option>
    </select>
    <select id="stockFilter" class="filter-select">
      <option value="">All Stock</option>
      <option value="instock">In Stock Only</option>
    </select>
    <span class="count-badge" id="countBadge"></span>
  </div>

  <!-- CATALOG -->
  <main class="catalog-section" id="catalog">
    <div class="grid" id="bookGrid">
      <div class="loading">Loading books…</div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 PageTurn Online Bookstore &nbsp;|&nbsp;
       <a href="order.html">Order Now</a> &nbsp;|&nbsp;
       <a href="admin.html">Admin Panel</a>
    </p>
  </footer>

  <!-- ── JAVASCRIPT ──────────────────────────────────────── -->
  <script>
    const GENRE_COLORS = {
      'Classic':  ['#2c3e50','#3498db'], 'Fiction':  ['#6c3483','#a569bd'],
      'Dystopia': ['#212f3d','#e74c3c'], 'Romance':  ['#922b21','#e8a0a0'],
      'Fantasy':  ['#0e6655','#52be80'], 'Self-Help':['#784212','#f0b27a'],
      'History':  ['#4d5656','#aab7b8'], 'General':  ['#1a5276','#5dade2']
    };
    const BOOK_EMOJIS = ['','','','','','',''];

    let allBooks = [];

    // Fetch books from embedded data (to avoid JSON loading issues)
    async function loadBooks() {
      try {
        // Embedded book data
        allBooks = [
          {
            "book_id": 1,
            "title": "Harry Potter",
            "author": "Leo",
            "genre": "Fantasy",
            "price": 500.00,
            "stock": 52,
            "cover_url": "When I heard it was the 20th anniversary of Harry Potter I had to give drawing a book cover a try! #harrypotter #illustration #bookcover.jpeg"
          },
          {
            "book_id": 2,
            "title": "Lost Star",
            "author": "Liya",
            "genre": "Fiction",
            "price": 420.00,
            "stock": 26,
            "cover_url": "The Lost Star and the Little Girl Tale.jpeg"
          },
          {
            "book_id": 3,
            "title": "Rapenzul",
            "author": "Zaara",
            "genre": "Fantasy",
            "price": 600.00,
            "stock": 60,
            "cover_url": "Tales from Whispering Woods.jpeg"
          },
          {
            "book_id": 4,
            "title": "The Great Gatsby",
            "author": "F. Scott Fitzgerald",
            "genre": "Classic",
            "price": 299.00,
            "stock": 15,
            "cover_url": "The Great Gatsby.jpeg"
          },
          {
            "book_id": 5,
            "title": "To Kill a Mockingbird",
            "author": "Harper Lee",
            "genre": "Classic",
            "price": 350.00,
            "stock": 20,
            "cover_url": "To Kill a Mockingbird.jpeg"
          },
          {
            "book_id": 6,
            "title": "1984",
            "author": "George Orwell",
            "genre": "Dystopia",
            "price": 320.00,
            "stock": 12,
            "cover_url": "1984.jpeg"
          },
          {
            "book_id": 7,
            "title": "Pride and Prejudice",
            "author": "Jane Austen",
            "genre": "Romance",
            "price": 280.00,
            "stock": 18,
            "cover_url": "Pride and Prejudice.jpeg"
          },
          {
            "book_id": 8,
            "title": "The Catcher in the Rye",
            "author": "J.D. Salinger",
            "genre": "Coming-of-age",
            "price": 310.00,
            "stock": 25,
            "cover_url": "The Catcher in the Rye.jpeg"
          },
          {
            "book_id": 9,
            "title": "The Hobbit",
            "author": "J.R.R. Tolkien",
            "genre": "Fantasy",
            "price": 450.00,
            "stock": 30,
            "cover_url": "The Hobbit.jpeg"
          },
          {
            "book_id": 10,
            "title": "The Alchemist",
            "author": "Paulo Coelho",
            "genre": "Self-Help",
            "price": 330.00,
            "stock": 22,
            "cover_url": "The Alchemist.jpeg"
          },
          {
            "book_id": 11,
            "title": "Sapiens",
            "author": "Yuval Noah Harari",
            "genre": "History",
            "price": 499.00,
            "stock": 8,
            "cover_url": "Sapiens.jpeg"
          },
          {
            "book_id": 12,
            "title": "Brave New World",
            "author": "Aldous Huxley",
            "genre": "Dystopia",
            "price": 380.00,
            "stock": 16,
            "cover_url": "Brave New World.jpeg"
          }
        ];
        
        populateGenreFilter();
        renderBooks(allBooks);
      } catch (e) {
        document.getElementById('bookGrid').innerHTML =
          '<p class="empty-state"> Could not load books. Please check if the data files exist.</p>';
      }
    }

    function populateGenreFilter() {
      const genres = [...new Set(allBooks.map(b => b.genre))].sort();
      const sel = document.getElementById('genreFilter');
      genres.forEach(g => {
        const opt = document.createElement('option');
        opt.value = g; opt.textContent = g;
        sel.appendChild(opt);
      });
    }

    function renderBooks(books) {
      const grid = document.getElementById('bookGrid');
      document.getElementById('countBadge').textContent = `${books.length} book${books.length !== 1 ? 's' : ''} found`;

      if (books.length === 0) {
        grid.innerHTML = '<p class="empty-state"> No books match your search.</p>';
        return;
      }

      grid.innerHTML = books.map((b, i) => {
        const colors = GENRE_COLORS[b.genre] || GENRE_COLORS['General'];
        const emoji  = BOOK_EMOJIS[b.book_id % BOOK_EMOJIS.length];
        const stockClass = b.stock === 0 ? 'out' : b.stock < 10 ? 'low' : '';
        const stockLabel = b.stock === 0 ? 'Out of Stock' : b.stock < 10 ? `Only ${b.stock} left!` : `${b.stock} in stock`;

        // Check if book has a cover image
        const hasImage = b.cover_url && b.cover_url.trim() !== '';
        const coverContent = hasImage 
          ? `<img src="${b.cover_url}" alt="${b.title}" onerror="this.style.display='none'; this.parentElement.style.background='linear-gradient(135deg,${colors[0]},${colors[1]})'; this.parentElement.innerHTML='<span>${emoji}</span>';">`
          : `<span>${emoji}</span>`;

        return `
          <div class="book-card" style="animation-delay:${i * 0.05}s">
            <div class="book-cover" style="${hasImage ? '' : `background:linear-gradient(135deg,${colors[0]},${colors[1]})`}">
              ${coverContent}
              <span class="genre-badge">${b.genre}</span>
              ${b.stock === 0 ? '<div class="out-of-stock-overlay">OUT OF STOCK</div>' : ''}
            </div>
            <div class="book-body">
              <div class="book-title">${b.title}</div>
              <div class="book-author">by ${b.author}</div>
              <div class="book-footer">
                <span class="book-price">₹${b.price.toFixed(2)}</span>
                <span class="stock-info ${stockClass}">${stockLabel}</span>
              </div>
              <a href="order.html?book=${b.book_id}"
                 class="btn-order ${b.stock === 0 ? 'disabled' : ''}">
                ${b.stock === 0 ? 'Unavailable' : 'Order Now →'}
              </a>
            </div>
          </div>`;
      }).join('');
    }

    function applyFilters() {
      const q     = document.getElementById('searchInput').value.toLowerCase();
      const genre = document.getElementById('genreFilter').value;
      const stock = document.getElementById('stockFilter').value;

      const filtered = allBooks.filter(b => {
        const matchQ = !q || b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q);
        const matchG = !genre || b.genre === genre;
        const matchS = stock !== 'instock' || b.stock > 0;
        return matchQ && matchG && matchS;
      });
      renderBooks(filtered);
    }

    document.getElementById('searchInput').addEventListener('input', applyFilters);
    document.getElementById('genreFilter').addEventListener('change', applyFilters);
    document.getElementById('stockFilter').addEventListener('change', applyFilters);

    loadBooks();
  </script>
</body>
</html>
