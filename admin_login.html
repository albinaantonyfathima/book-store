<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — PageTurn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink:    #1a1a2e;
      --paper:  #faf7f2;
      --cream:  #f0ebe0;
      --accent: #c0392b;
      --gold:   #d4a017;
      --green:  #27ae60;
      --muted:  #7a7060;
      --radius: 12px;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, var(--ink) 60%, #2c2c54 100%);
      color: var(--paper);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .login-container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: var(--radius);
      padding: 3rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      position: relative;
      z-index: 10;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 900;
      color: var(--ink);
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo span { color: var(--gold); }
    .login-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--ink);
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.8rem 1rem;
      border: 2px solid #e5e0d8;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      border-color: var(--accent);
    }
    .login-btn {
      width: 100%;
      padding: 0.9rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .login-btn:hover {
      background: #a93226;
      transform: translateY(-2px);
    }
    .error-message {
      background: #f8d7da;
      color: #721c24;
      padding: 0.8rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
    }
    .error-message.show {
      display: block;
    }
    .back-link {
      text-align: center;
      margin-top: 1.5rem;
    }
    .back-link a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back-link a:hover {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">Page<span>Turn</span></div>
    <h2 class="login-title">Admin Login</h2>
    
    <div class="error-message" id="errorMessage">
      Invalid username or password. Please try again.
    </div>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      
      <button type="submit" class="login-btn">Login</button>
    </form>
    
    <div class="back-link">
      <a href="index.html">← Back to Store</a>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMessage');
      
      // Simple authentication (in production, use proper server-side validation)
      if (username === 'princy' && password === '123') {
        // Store login session
        sessionStorage.setItem('adminLoggedIn', 'true');
        sessionStorage.setItem('adminUser', username);
        
        // Redirect to admin panel
        window.location.href = 'admin.html';
      } else {
        // Show error message
        errorMsg.classList.add('show');
        
        // Clear password field
        document.getElementById('password').value = '';
        
        // Hide error after 3 seconds
        setTimeout(() => {
          errorMsg.classList.remove('show');
        }, 3000);
      }
    });
    
    // Check if already logged in
    if (sessionStorage.getItem('adminLoggedIn') === 'true') {
      window.location.href = 'admin.html';
    }
  </script>
</body>
</html>
